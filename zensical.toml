[project]
site_name = "UniHarmony"
site_url = "https://github.com/N-Nieto/UniHarmony"
repo_url = "https://github.com/N-Nieto/UniHarmony"
repo_name = "N-Nieto/UniHarmony"
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = "getting_started.md"},
  {"Utilities" = [
      {"Simulate Multisite Data" = "simulate_multisite_data.md"},
      {"Load MAREos Datasets" = "load_mareos_datasets.md"},
  ]},
  {"Methods" = [
      {"Interpolation" = "interpolation.md"},
  ]},
  {"Examples" = [
      {"Load MAREoS" = "examples/load_mareos_example.md"},
      {"Generate mutlisite data" = "examples/generate_multisite_data_example.md"},
      {"Multisite data characterization" = "examples/multisite_data_characterization_example.md"},
      {"ICI binary" = "examples/ICI_binary_classification_example.md"},
      {"ICI multiclass" = "examples/ICI_multiclass_classification_example.md"},
  ]},
  {"API Reference" = "api_reference.md"},
]

[project.theme]
features = [
    "content.code.copy",
    "navigation.top",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
inherited_members = true
show_source = true
